baseURL:  "https://pwenker.com"
languageCode: en-us
title: "Pascal's blog"
theme: "toha"

# Manage languages
# For any more details, you can check the official documentation: https://gohugo.io/content-management/multilingual/
languages:
  en:
    languageName: English
    weight: 1
  # de:
  #   languageName: Deutsch
  #   weight: 2

# Control TOC depth
markup:
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# Enable Disqus forum
disqusShortname: www-pwenker-com
# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  background: "images/bg2.JPG"
  math: true

  # The inverted logo will be used in the initial transparent navbar and
  # the main logo will be used in the non-transparent navbar.
  logo:
    main: images/pw.png
    inverted: images/pw.png
    favicon: images/pw.png
  # GitHub repo URL of your site
  gitRepo: https://github.com/pwenker/pwenker.github.io
  gitBranch: main

  # specify whether you want to write some blog posts or not
  enableBlogPost: true

  # specify whether you want to show Table of Contents in reading page
  enableTOC: true

  # Provide newsletter configuration. This feature hasn't been implemented yet.
  # Currently, you can just hide it from the footer.
  newsletter:
    enable: false
